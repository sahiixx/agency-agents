version: "3.8"

services:
  agency-os:
    build: .
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - DATABASE_URL=file:./dev.db
      - NODE_ENV=production
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    volumes:
      - ./prisma/dev.db:/app/prisma/dev.db
      - ~/.agents/skills:/app/.agents/skills:ro
    restart: unless-stopped
