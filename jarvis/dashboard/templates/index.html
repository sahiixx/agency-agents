<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title }}</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <main>
    <h1>{{ title }}</h1>
    <p>Local-first dashboard running at <strong>http://localhost:8080</strong></p>
    <section>
      <h2>Module Toggles</h2>
      <ul>
      {% for module in modules %}
        <li><label><input type="checkbox" checked /> {{ module }}</label></li>
      {% endfor %}
      </ul>
    </section>
    <section>
      <h2>Command History</h2>
      <pre id="history">No commands yet.</pre>
    </section>
  </main>
</body>
</html>
