name: CI — Claude-Powered Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  structural-tests:
    name: Structural Tests (no API key)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deepagents SDK
        run: |
          cd deepagents/libs/deepagents
          pip install -e . --quiet --break-system-packages
          pip install langchain-anthropic anthropic --quiet --break-system-packages

      - name: Run structural tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/deepagents/libs/deepagents
          python3 tests/agent_tests.py -v 2>&1

  lint-agents:
    name: Lint Agent Files
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed agent files
        id: changed
        run: |
          FILES=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD -- \
            'design/**/*.md' 'engineering/**/*.md' 'marketing/**/*.md' 'sales/**/*.md' \
            'specialized/**/*.md' 'testing/**/*.md' 'support/**/*.md' \
            'project-management/**/*.md' 'product/**/*.md')
          {
            echo "files<<ENDOFLIST"
            echo "$FILES"
            echo "ENDOFLIST"
          } >> "$GITHUB_OUTPUT"

      - name: Lint changed agents
        if: steps.changed.outputs.files != ''
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
        run: |
          chmod +x scripts/lint-agents.sh
          ./scripts/lint-agents.sh $CHANGED_FILES

  live-llm-tests:
    name: Live LLM Tests (Claude API)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          cd deepagents/libs/deepagents
          pip install -e . --quiet --break-system-packages
          pip install langchain-anthropic anthropic --quiet --break-system-packages

      - name: Run live LLM tests
        if: env.ANTHROPIC_API_KEY != ''
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/deepagents/libs/deepagents
          python3 tests/agent_tests.py -v 2>&1
